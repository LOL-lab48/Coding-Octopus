<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coding Octopus By LOL-Labs</title>

  <!-- CSS LINK (IMPORTANT) -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="site-header">
  <div class="header-title">
    🚀 Coding Octopus By LOL-Labs
    <span>Build faster. Learn easier.</span>
  </div>

  <nav class="nav-links">
    <a href="https://lol-lab48.github.io/LOL-Labs/" target="_blank">LOL-Labs</a>
    <a href="https://lol-lab48.github.io/LockiGen/" target="_blank">Password Tool</a>
    <a href="https://lol-lab48.github.io/BytePath-48/" target="_blank">Coding</a>
  </nav>
</header>

<!-- PROJECT BAR -->
<div class="project-bar">
  <select id="projectList"></select>
  <button onclick="createProject()">➕ New</button>
  <button onclick="renameProject()">✏️ Rename</button>
  <button onclick="deleteProject()">🗑 Delete</button>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <button data-block="text">➕ Text</button>
  <button data-block="button">➕ Button</button>
  <button data-block="image">🖼 Image</button>
  <button onclick="downloadProject()">💾 Download</button>
  <button onclick="publishProject()">📤 Publish</button>
  <button onclick="resetAll()">♻ Reset</button>
</div>

<!-- MAIN -->
<div class="container">
  <div class="editors">
    <div class="editor-box">
      <label>HTML</label>
      <textarea id="html"></textarea>
    </div>

    <div class="editor-box">
      <label>CSS</label>
      <textarea id="css"></textarea>
    </div>

    <div class="editor-box">
      <label>JavaScript</label>
      <textarea id="js"></textarea>
    </div>
  </div>

  <div class="preview">
    <div class="preview-header">Live Preview</div>
    <iframe id="preview"></iframe>
  </div>
</div>

<script src="script.js"></script>

<footer>
  <p>⚠️ Use at your own risk.</p>
  <p>© 2026 LOL-Labs</p>
</footer>

</body>
</html>
